name: "Texture Issue / 材质问题"
description: "Report a missing or incorrect texture. / 报告缺失或错误的材质。"
body:
  - type: "input"
    id: "pack_version"
    attributes:
      label: "Pack Version / 材质包版本"
      placeholder: "Example: 1.0.0"
    validations:
      required: true

  - type: "input"
    id: "object"
    attributes:
      label: "Block / Item / GUI"
      description: "Which block, item, or interface has the issue? / 哪个方块、物品或界面出现问题？"
      placeholder: "Example: AE2 Controller"

  - type: "textarea"
    id: "description"
    attributes:
      label: "Description / 问题描述"
      description: "Describe the texture issue. / 描述材质问题。"

  - type: "textarea"
    id: "screenshot"
    attributes:
      label: "Screenshot / 截图"
      description: "Drag screenshots here if possible. / 如果可以，请拖入截图。"
